apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/api-gateway:1
          ports:
            - containerPort: 8080
          env:
            - name: USER_SERVICE_URL
              value: "http://user-service:8081"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:8082"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:8083"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:8084"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ecommerce
spec:
  type: ClusterIP           # Internal — frontend nginx proxies to it; not exposed directly
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
